name: Build APK
on:
  push:
    branches: [main]
    paths: ['ios/**', 'internal/**', 'cmd/**', 'web/**', 'logo/**', 'android/**', '.github/workflows/**', 'go.mod', 'go.sum']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }

      - name: Generate all icons from logo
        run: ./generate-icons.sh

      - name: Setup Android SDK
        run: |
          # Download command line tools
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm -rf cmdline-tools.zip
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;34.0.0" 2>&1
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "SDK installed successfully"

      - name: Build Go executable for Android
        run: |
          android/build-libvect.sh
          ls -la android/app/src/main/assets/bin/vect_server_*

      - name: Setup Gradle wrapper
        run: |
          if ! command -v gradle &>/dev/null; then
            echo "Gradle not found, installing..."
            wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt
            export PATH="/opt/gradle-8.6/bin:$PATH"
            echo "/opt/gradle-8.6/bin" >> $GITHUB_PATH
          fi
          cd android && gradle wrapper --gradle-version=8.6 2>&1

      - name: Build APK
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Diagnostics
        if: failure()
        run: |
          tail -200 /tmp/build.log 2>/dev/null
          find android -name "*.apk" -type f 2>/dev/null || echo "No APK"

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Vect.apk && echo "APK ready"

      - uses: actions/upload-artifact@v4
        with:
          name: Vect-APK
          path: android/app/build/outputs/apk/debug/Vect.apk

      - name: Publish to Vect-IP release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="Vect-IP-$(date -u +%Y%m%d)-${GITHUB_SHA:0:7}"
          gh release upload "$TAG" android/app/build/outputs/apk/debug/Vect.apk --clobber 2>/dev/null || \
          gh release create "$TAG" \
            --title "Vect-IP $(date -u +%Y-%m-%d)" \
            --notes "Auto-built from commit ${GITHUB_SHA} on $(date -u)" \
            --target "$GITHUB_SHA" \
            android/app/build/outputs/apk/debug/Vect.apk