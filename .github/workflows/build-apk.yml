name: Build APK
on:
  push:
    branches: [main]
    paths: ['ios/**', 'internal/**', 'cmd/**', 'cmd/vect-web/web/**', 'android/**', '.github/workflows/**', 'go.mod', 'go.sum']
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --install "ndk;26.1.10909125" "build-tools;34.0.0" "platforms;android-34"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> $GITHUB_ENV

      - name: Build Go shared libraries for Android
        run: |
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/26.1.10909125"
          android/build-libvect.sh 2>&1
          echo "--- verify ---"
          ls -la android/app/src/main/jniLibs/arm64-v8a/libvect.so
          ls -la android/app/src/main/cpp/libvect.h

      - name: Setup Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.6 2>&1

      - name: Build APK
        id: build
        working-directory: android
        continue-on-error: true
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "GRADLE_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
            exit ${PIPESTATUS[0]}
          fi

      - name: Show Gradle error log
        if: failure()
        run: |
          echo "=== Last 80 lines of Gradle output ==="
          tail -80 /tmp/gradle.log 2>/dev/null || echo "No gradle log"
          echo "=== Build output directory ==="
          find android/app/build -maxdepth 4 -type f 2>/dev/null | head -20 || echo "No outputs"
          echo "=== Java version ==="
          java -version 2>&1
          echo "=== Gradle version ==="
          (cd android && ./gradlew --version 2>&1) || echo "gradlew not available"

      - name: Upload Gradle log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: /tmp/gradle.log

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/Vect.apk 2>/dev/null && \
          echo "APK ready" || \
          cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/Vect.apk 2>/dev/null && \
          echo "APK ready (signed)" || \
          find android/app/build -name "*.apk" -type f 2>/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: Vect-APK
          path: android/app/build/outputs/apk/release/Vect.apk

      - name: Publish latest APK
        if: github.event_name == 'push' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f android/app/build/outputs/apk/release/Vect.apk ]; then
            gh release delete latest-apk --cleanup-tag --yes 2>/dev/null || true
            gh release create latest-apk \
              --title "Latest APK Build (${{ github.sha }})" \
              --notes "Auto-built from commit ${{ github.sha }} on $(date -u)" \
              --target ${{ github.sha }} \
              android/app/build/outputs/apk/release/Vect.apk
          fi