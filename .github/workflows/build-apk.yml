name: Build APK
on:
  push:
    branches: [main]
    paths: ['ios/**', 'internal/**', 'cmd/**', 'cmd/vect-web/web/**', 'android/**', '.github/workflows/**', 'go.mod', 'go.sum']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --install "ndk;26.1.10909125" "build-tools;34.0.0" "platforms;android-34"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build Go shared libraries
        run: |
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/26.1.10909125"
          android/build-libvect.sh
          echo "=== Verify outputs ==="
          ls -la android/app/src/main/jniLibs/arm64-v8a/libvect.so
          ls -la android/app/src/main/cpp/libvect.h

      - name: Setup Gradle wrapper
        run: cd android && gradle wrapper --gradle-version=8.6

      - name: Build APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace --info 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Gradle diagnostics
        if: failure()
        run: |
          echo "=== Build output (last 100 lines) ==="
          tail -100 /tmp/build.log 2>/dev/null || echo "No log"
          echo "=== APK search ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "No APK files"
          echo "=== Build reports ==="
          find android/app/build/reports -type f 2>/dev/null | head -20 || echo "No reports"

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/Vect.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Vect-APK
          path: android/app/build/outputs/apk/release/Vect.apk

      - name: Publish APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-apk --cleanup-tag --yes 2>/dev/null || true
          gh release create latest-apk \
            --title "Latest APK Build (${{ github.sha }})" \
            --notes "Auto-built from commit ${{ github.sha }} on $(date -u)" \
            --target ${{ github.sha }} \
            android/app/build/outputs/apk/release/Vect.apk