name: Release All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
    paths: ['internal/**', 'cmd/**', 'web/**', 'logo/**', 'android/**', 'ios/**', '.github/workflows/**', 'go.mod', 'go.sum', 'VERSION']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ======== CLI + Windows 桌面 ========
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-go@v5
        with: { go-version: '1.21' }

      - run: mkdir -p build

      - name: Build CLI - Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o build/vect-linux-amd64 -ldflags="-s -w" ./cmd/vect/

      - name: Build CLI - Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o build/vect-linux-arm64 -ldflags="-s -w" ./cmd/vect/

      - name: Build CLI - Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o build/vect-windows-amd64.exe -ldflags="-s -w" ./cmd/vect/

      - name: Build CLI - macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o build/vect-darwin-amd64 -ldflags="-s -w" ./cmd/vect/

      - name: Build CLI - macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o build/vect-darwin-arm64 -ldflags="-s -w" ./cmd/vect/

      - name: Install ImageMagick
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y && sudo apt-get install -y imagemagick

      - name: Generate icons
        run: ./generate-icons.sh

      - name: Build Windows Desktop
        run: |
          go install github.com/akavel/rsrc@latest
          cd windows && rsrc -ico app.ico -o rsrc.syso && cd ..
          GOOS=windows GOARCH=amd64 go build -o build/Vect.exe -ldflags="-s -w" ./windows/

      - uses: actions/upload-artifact@v4
        with:
          name: cli-desktop
          path: build/
          retention-days: 1

  # ======== Android APK ========
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }

      - uses: actions/setup-go@v5
        with: { go-version: '1.21' }

      - name: Generate icons
        run: ./generate-icons.sh

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm -rf cmdline-tools.zip
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        run: |
          if ! command -v gradle &>/dev/null; then
            wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt
            echo "/opt/gradle-8.6/bin" >> $GITHUB_PATH
            export PATH="/opt/gradle-8.6/bin:$PATH"
          fi
          cd android && gradle wrapper --gradle-version=8.6

      - name: Build Go binary for Android
        run: android/build-libvect.sh

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p build
          cp android/app/build/outputs/apk/debug/app-debug.apk build/Vect.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/Vect.apk
          retention-days: 1

  # ======== iOS IPA ========
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.21' }

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Generate icons
        run: |
          ./generate-icons.sh
          cd ios && ./generate-icons.sh

      - name: Build Go static library for iOS
        run: cd ios && ./build-libvect.sh

      - name: Build .app (unsigned)
        run: |
          xcodebuild clean build \
            -project ios/VectApp.xcodeproj \
            -scheme VectApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/derived \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/derived/Build/Products/Release-iphoneos/VectApp.app build/Payload/
          cd build && zip -r VectApp.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/VectApp.ipa
          retention-days: 1

  # ======== 创建 Release ========
  release:
    needs: [build-cli, build-apk, build-ipa]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/download-artifact@v4
        with: { name: cli-desktop }

      - uses: actions/download-artifact@v4
        with: { name: apk }

      - uses: actions/download-artifact@v4
        with: { name: ipa }

      - name: 读取版本号
        id: ver
        run: echo "tag=v$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: 生成发版标题 (北京时间)
        id: title
        run: echo "title=Vect v$(cat VERSION) - $(TZ='Asia/Shanghai' date '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 生成变更日志
        id: log
        run: |
          last=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$last" ]; then
            git log ${last}..HEAD --oneline --no-merges > /tmp/changelog
          else
            git log --oneline --no-merges -20 > /tmp/changelog
          fi
          {
            echo "## 变更"
            [ -s /tmp/changelog ] && cat /tmp/changelog || echo "首次发版"
          } > /tmp/release-body.md
          cat /tmp/release-body.md

      - name: 列出产物
        run: ls -laR . || true

      - name: 创建 Release
        run: |
          set -e
          TAG="v$(cat VERSION)"
          BODY=$(cat /tmp/release-body.md | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          # 检查 Release 是否存在
          EXISTING=$(curl -s -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Release $TAG 已存在 (ID: $EXISTING)，删除后重建"
            curl -s -X DELETE -H "Authorization: token ${{ github.token }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$EXISTING"
            curl -s -X DELETE -H "Authorization: token ${{ github.token }}" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$TAG" || true
          fi

          # 创建 Release
          RESP=$(curl -s -X POST -H "Authorization: token ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"Vect v$(cat VERSION) - $(TZ='Asia/Shanghai' date '+%Y-%m-%d')\",\"body\":$BODY,\"target_commitish\":\"${{ github.sha }}\",\"draft\":false,\"prerelease\":false}" \
            "https://api.github.com/repos/${{ github.repository }}/releases")
          echo "创建 Release 响应: $RESP" | head -5
          RELEASE_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
          echo "Release ID: $RELEASE_ID"

          if [ -z "$RELEASE_ID" ]; then
            echo "创建 Release 失败"
            exit 1
          fi

          # 上传产物
          for f in vect-* Vect.exe Vect.apk VectApp.ipa; do
            if [ -f "$f" ]; then
              echo "Uploading $f ($(stat -c%s "$f") bytes)..."
              UPLOAD_RESP=$(curl -s -X POST -H "Authorization: token ${{ github.token }}" \
                -H "Content-Type: application/octet-stream" \
                "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$f" \
                --data-binary "@$f")
              echo "Upload response: $UPLOAD_RESP" | head -3
            else
              echo "File not found: $f"
            fi
          done
          echo "Release $TAG 完成"