name: Build IPA
on:
  push:
    branches: [main]
    paths: ['ios/**', 'internal/**', 'cmd/**', 'web/**', 'logo/**', 'windows/**', '.github/workflows/**', 'go.mod', 'go.sum']
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Generate all icons from logo
        run: ./generate-icons.sh

      - name: Generate iOS app icons
        run: cd ios && ./generate-icons.sh

      - name: Build Go static library for iOS
        run: cd ios && ./build-libvect.sh

      - name: Build .app (unsigned)
        run: |
          xcodebuild build \
            -project ios/VectApp.xcodeproj \
            -scheme VectApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/derived \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r build/derived/Build/Products/Release-iphoneos/VectApp.app build/Payload/
          cd build && zip -r VectApp.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: VectApp
          path: build/VectApp.ipa

      - name: Verify IPA
        run: |
          unzip -l build/VectApp.ipa | head -20
          echo "---"
          ls -lh build/VectApp.ipa