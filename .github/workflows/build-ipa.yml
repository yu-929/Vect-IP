name: Build IPA
on:
  push:
    branches: [main]
    paths: ['ios/**', 'internal/**', 'cmd/**', 'web/**', 'logo/**', '.github/workflows/**', 'go.mod', 'go.sum']
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate all icons from logo
        run: ./generate-icons.sh

      - name: Generate iOS app icons
        run: cd ios && ./generate-icons.sh

      - name: Build Go static library for iOS
        run: cd ios && ./build-libvect.sh

      - name: Build .app (unsigned)
        run: |
          xcodebuild build \
            -project ios/VectApp.xcodeproj \
            -scheme VectApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/derived \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r build/derived/Build/Products/Release-iphoneos/VectApp.app build/Payload/
          cd build && zip -r VectApp.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: VectApp
          path: build/VectApp.ipa

      - name: Upload IPA to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} build/VectApp.ipa --clobber

      - name: Publish to Vect-IP release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="Vect-IP-$(date -u +%Y%m%d)-${GITHUB_SHA:0:7}"
          gh release upload "$TAG" build/VectApp.ipa --clobber 2>/dev/null || \
          gh release create "$TAG" \
            --title "Vect-IP $(date -u +%Y-%m-%d)" \
            --notes "Auto-built from commit ${GITHUB_SHA} on $(date -u)" \
            --target "$GITHUB_SHA" \
            build/VectApp.ipa

      - name: Verify IPA
        run: |
          unzip -l build/VectApp.ipa | head -20
          echo "---"
          ls -lh build/VectApp.ipa