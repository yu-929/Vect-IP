<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vect">
<link rel="manifest" href="/manifest.json">
<title>Vect - Monte Carlo IP Selector</title>
<style>
:root{--bg:#0F1118;--surface:#1A1D28;--input:#242836;--border:#303647;--text:#FFFFFF;--secondary:#B0B8D0;--muted:#78829C;--brand:#4294FF;--danger:#FF5F57;--success:#34C759;--orange:#FF9500;--stage1:#60E0E8;--stage2:#4294FF;--stage3:#70B8FF;--stage4:#B388FF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;padding-top:env(safe-area-inset-top)}
.container{max-width:800px;margin:0 auto;padding:12px 16px 40px;padding-bottom:calc(env(safe-area-inset-bottom) + 40px)}

/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;position:sticky;top:0;z-index:50;background:rgba(15,17,24,.85);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px)}
.nav-brand{display:flex;flex-direction:column;gap:1px}
.nav-title{font-size:24px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,var(--brand),#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.nav-sub{font-size:13px;color:var(--muted);font-weight:400;letter-spacing:.2px}
.nav-actions{display:flex;gap:4px}
.nav-btn{width:36px;height:36px;border-radius:10px;border:none;background:transparent;color:var(--secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover,.nav-btn:active{background:var(--input);color:var(--text)}
.nav-btn svg{width:20px;height:20px}

/* Card */
.card{background:var(--surface);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.card-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* Segmented Control */
.segmented{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:14px}
.seg-btn{flex:1;padding:7px 12px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.seg-btn.active{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(66,148,255,.3)}
.seg-btn:hover:not(.active){color:var(--secondary)}

/* Layout */
.section{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
.section:first-child{border-top:none;padding-top:0;margin-top:0}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{position:relative}
.field label{display:block;font-size:12px;font-weight:500;color:var(--secondary);margin-bottom:4px;letter-spacing:.2px}
.field input,.field select{width:100%;height:44px;padding:0 12px;background:var(--input);border:1px solid transparent;border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:all .2s;font-family:inherit;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(66,148,255,.15)}
.field input::placeholder{color:var(--muted)}
.field select{background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' fill='%2378829C' viewBox='0 0 10 6'%3E%3Cpath d='M1 1l4 4 4-4'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
textarea{width:100%;min-height:78px;padding:10px 12px;background:var(--input);border:1px solid transparent;border-radius:10px;color:var(--text);font-size:13px;font-family:'SF Mono',ui-monospace,monospace;resize:vertical;outline:none;line-height:1.5;transition:all .2s}
textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(66,148,255,.15)}

/* Input adornments */
.input-group{display:flex;gap:6px}
.input-group input{flex:1}
.input-group .btn-icon{height:44px;width:44px;border-radius:10px;border:1px solid var(--border);background:var(--input);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.input-group .btn-icon:hover{color:var(--text);border-color:var(--brand)}
.tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.5px;height:18px;margin-right:4px}
.tag-white{background:rgba(66,148,255,.15);color:var(--brand)}
.tag-black{background:rgba(255,95,87,.15);color:var(--danger)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;height:50px}
.btn-primary{flex:7;background:var(--brand);color:#fff;box-shadow:0 4px 16px rgba(66,148,255,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(66,148,255,.35)}
.btn-primary:disabled{opacity:.35;transform:none;box-shadow:none;cursor:not-allowed}
.btn-danger{flex:3;background:rgba(255,95,87,.12);color:var(--danger);border:1px solid rgba(255,95,87,.2)}
.btn-danger:hover{background:rgba(255,95,87,.2)}
.btn-danger.hidden{display:none}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-icon-sm{width:32px;height:32px;border-radius:8px;border:none;background:var(--input);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon-sm:hover{color:var(--text);background:var(--border)}

/* Progress Stages */
.progress-card{padding-bottom:16px}
.stage-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.stage{background:var(--bg);border-radius:12px;padding:12px 14px}
.stage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.stage-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.stage-count{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.stage-bar{height:5px;background:var(--input);border-radius:3px;overflow:hidden}
.stage-fill{height:100%;border-radius:3px;transition:width .5s ease;width:0%}
.stage-footer{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--muted)}
.stage-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.stage-dot.active{animation:stPulse 1.2s ease-in-out infinite}
@keyframes stPulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Global progress */
.global-progress{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:12px 14px;background:var(--bg);border-radius:12px}
.global-bar{flex:1;height:7px;background:var(--input);border-radius:4px;overflow:hidden}
.global-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--stage1),var(--stage2),var(--stage3),var(--stage4));transition:width .5s ease;width:0%}
.global-info{text-align:right;flex-shrink:0}
.global-pct{font-size:15px;font-weight:700;color:var(--text)}
.global-time{font-size:11px;color:var(--muted);margin-top:1px}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-item{background:var(--bg);border-radius:10px;padding:10px;text-align:center}
.stat-val{font-size:17px;font-weight:700;color:var(--text);line-height:1.3}
.stat-val.brand{color:var(--brand)}
.stat-val.mono{font-family:'SF Mono',ui-monospace,monospace;font-size:13px}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Table */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);color:var(--muted);font-weight:600;padding:10px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:rgba(66,148,255,.04)}
tbody tr:nth-child(even) td{background:rgba(255,255,255,.015)}
.badge{display:inline-flex;align-items:center;padding:1px 8px;border-radius:12px;font-size:11px;font-weight:600;height:20px}
.badge-ok{background:rgba(52,199,89,.15);color:var(--success)}
.badge-fail{background:rgba(255,95,87,.15);color:var(--danger)}
.colo-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:600;height:18px;background:rgba(66,148,255,.12);color:#93C5FD}
.ip-cell{font-family:'SF Mono',ui-monospace,monospace;font-size:12px;color:#A5B4FC;cursor:pointer}
.ip-cell:hover{color:var(--brand)}
.score-num{font-weight:600;font-variant-numeric:tabular-nums}
.score-unit{color:var(--muted);font-weight:400;font-size:11px}
.route-premium{color:#34C759}
.route-optimized{color:#FFD700}
.route-normal{color:var(--muted)}

/* Status */
.status-bar{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--secondary);margin-top:10px;padding:8px 12px;background:var(--bg);border-radius:10px}
.scan-id{font-size:11px;color:var(--muted);font-family:'SF Mono',ui-monospace,monospace;margin-left:auto}
.error-box{display:flex;align-items:center;gap:8px;padding:12px 14px;background:rgba(255,95,87,.1);border:1px solid rgba(255,95,87,.2);border-radius:12px;color:#FCA5A5;font-size:13px;margin-top:8px}
.hidden{display:none!important}
.empty-state{text-align:center;padding:28px 16px;color:var(--muted);font-size:14px}

/* Menu */
.menu-wrap{position:relative}
.menu-drop{position:absolute;top:42px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;min-width:200px;box-shadow:0 8px 40px rgba(0,0,0,.5);z-index:100;display:none}
.menu-drop.show{display:block}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--text);font-size:13px;cursor:pointer;transition:all .1s;width:100%;text-align:left;font-family:inherit}
.menu-item:hover{background:var(--input)}
.menu-item svg{width:16px;height:16px;color:var(--muted);flex-shrink:0}
.menu-divider{height:1px;background:var(--border);margin:4px 8px}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:200;transition:opacity .3s;opacity:0;pointer-events:none}
.toast.show{opacity:1}

/* Local IP card */
.local-info{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.local-item{background:var(--bg);border-radius:10px;padding:10px}
.local-label{font-size:10px;color:var(--muted);margin-bottom:3px}
.local-val{font-size:14px;font-weight:600;color:var(--text);font-family:'SF Mono',ui-monospace,monospace;word-break:break-all}
.local-val.public{color:var(--brand)}

/* Traceroute */
.trace-wrap{margin-top:8px;padding:10px 12px;background:var(--bg);border-radius:10px;max-height:200px;overflow-y:auto}
.trace-row{display:flex;gap:8px;font-size:11px;font-family:'SF Mono',ui-monospace,monospace;padding:2px 0}
.trace-hop{color:var(--muted);width:24px;flex-shrink:0}
.trace-ip{color:var(--secondary);flex:1}
.trace-ms{color:#93C5FD;width:50px;text-align:right;flex-shrink:0}
.trace-lost{color:var(--danger)}

@media(max-width:480px){.row{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(3,1fr)}.stage-header{flex-wrap:wrap;gap:4px}.local-info{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="container">
<!-- Nav Bar -->
<div class="nav">
<div class="nav-brand">
<div class="nav-title">Vect</div>
<div class="nav-sub">Monte Carlo IP Selector</div>
</div>
<div class="nav-actions">
<div class="menu-wrap">
<button class="nav-btn" onclick="toggleMenu()" aria-label="菜单">
<svg viewBox="0 0 20 20" fill="currentColor"><circle cx="10" cy="4" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="10" cy="16" r="1.5"/></svg>
</button>
<div class="menu-drop" id="menuDrop">
<div class="menu-item" onclick="applyPreset('sjc')">
<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10l4-4v3h12v2H6v3l-4-4z"/></svg>
SJC 美西低延迟
</div>
<div class="menu-item" onclick="applyPreset('global')">
<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><path d="M2 10h16M10 3a15 15 0 010 14M10 3a15 15 0 000 14"/></svg>
全球全量扫描
</div>
<div class="menu-item" onclick="applyPreset('hkg')">
<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2l8 6-3 10H5L2 8l8-6z"/></svg>
香港优化参数
</div>
<div class="menu-divider"></div>
<div class="menu-item" onclick="copyResults()">
<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="12" height="14" rx="2"/><path d="M7 2h8a1 1 0 011 1v11"/></svg>
导出结果
</div>
<div class="menu-item" onclick="document.getElementById('cidrs').value='';document.getElementById('asn').value='';showToast('已清空')">
<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h12M6 6V4a1 1 0 011-1h6a1 1 0 011 1v2M8 9v6M12 9v6M3 6l1 12h12l1-12"/></svg>
清空输入
</div>
</div>
</div>
</div>
</div>

<!-- Local IP Info -->
<div class="card" id="localIPCard">
<div class="card-title">
本地网络
<span id="localRefresh" style="margin-left:auto;font-size:11px;cursor:pointer;color:var(--brand);text-transform:none;letter-spacing:0" onclick="fetchLocalIP()">刷新</span>
</div>
<div class="local-info" id="localInfo">
<div class="local-item"><div class="local-label">公网 IP</div><div class="local-val public" id="liPublic">--</div></div>
<div class="local-item"><div class="local-label">本地 IP</div><div class="local-val" id="liLocal">--</div></div>
<div class="local-item"><div class="local-label">运营商</div><div class="local-val" id="liISP">--</div></div>
<div class="local-item"><div class="local-label">地理位置</div><div class="local-val" id="liLocation">--</div></div>
</div>
</div>

<!-- Scan Config -->
<div class="card">
<div class="card-title">扫描配置</div>
<div class="segmented">
<button class="seg-btn" data-cidrs="1.1.1.0/24&#10;1.0.0.0/24&#10;1.2.0.0/16&#10;1.3.0.0/16" data-budget="2000" data-concurrency="200">Cloudflare 快速</button>
<button class="seg-btn" data-cidrs="1.1.0.0/16&#10;1.0.0.0/16&#10;1.2.0.0/16&#10;1.3.0.0/16&#10;162.158.0.0/15&#10;173.245.48.0/20" data-budget="5000" data-concurrency="200">Cloudflare 完整</button>
</div>
<div class="section">
<div class="field">
<label>CIDR 前缀（每行一个）</label>
<div class="input-group">
<textarea id="cidrs" placeholder="1.1.1.0/24&#10;2606:4700::/32"></textarea>
</div>
</div>
</div>
<div class="section">
<div class="field">
<label>或输入 ASN 自动解析</label>
<div class="input-group">
<input id="asn" type="number" placeholder="例如 13335">
<button class="btn-icon" id="resolveBtn" onclick="resolveASN()" aria-label="解析 ASN">
<svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3l6 6-6 6M4 9h12"/></svg>
</button>
</div>
</div>
</div>

<div class="section">
<div class="row">
<div class="field"><label>IP 版本</label>
<select id="ipVersion"><option value="0">IPv4 + IPv6</option><option value="4">仅 IPv4</option><option value="6">仅 IPv6</option></select>
</div>
<div class="field"><label>&nbsp;</label>
<select id="ipVersion2"><option value="0">IPv4 + IPv6</option><option value="4">仅 IPv4</option><option value="6">仅 IPv6</option></select>
</div>
</div>
</div>

<div class="section">
<div class="row">
<div class="field"><label>探测预算</label><input id="budget" type="number" value="2000"></div>
<div class="field"><label>搜索头</label><input id="heads" type="number" value="4"></div>
<div class="field"><label>波束宽度</label><input id="beam" type="number" value="32"></div>
<div class="field"><label>并发数</label><input id="concurrency" type="number" value="200"></div>
<div class="field"><label>保留 TOP</label><input id="topN" type="number" value="20"></div>
<div class="field"><label>带宽测速 TOP</label><input id="downloadTop" type="number" value="5"></div>
</div>
</div>

<div class="section">
<div class="row">
<div class="field"><label>超时 (s)</label><input id="timeout" type="number" value="3" step="0.5"></div>
<div class="field"><label>测试轮次</label><input id="rounds" type="number" value="6"></div>
<div class="field"><label>目标域名</label><input id="host" value="example.com"></div>
<div class="field"><label>请求路径</label><input id="path" value="/cdn-cgi/trace"></div>
</div>
</div>

<div class="section">
<div class="row">
<div class="field">
<label>测速模式</label>
<select id="downloadMode"><option value="all">固定数量</option><option value="sequential" selected>Sequential</option></select>
</div>
<div class="field"><label>&nbsp;</label>
<input id="coloAllow" placeholder="如 HKG,SJC,NRT"><span class="tag tag-white" style="position:absolute;right:10px;top:28px">WHITE</span>
</div>
<div class="field"><label>&nbsp;</label>
<input id="coloExclude" placeholder="如 LAX,DFW"><span class="tag tag-black" style="position:absolute;right:10px;top:28px">BLACK</span>
</div>
<div class="field"><label>&nbsp;</label></div>
</div>
</div>

<div class="btn-row">
<button class="btn btn-primary" id="startBtn" onclick="startScan()">
<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5v11l9-5.5z"/></svg>
开始扫描
</button>
<button class="btn btn-danger hidden" id="cancelBtn" onclick="cancelScan()">
<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 3l10 10M13 3L3 13"/></svg>
取消
</button>
</div>
</div>

<!-- Progress -->
<div id="progressCard" class="card progress-card hidden">
<div class="card-title">扫描进度</div>

<!-- Global -->
<div class="global-progress">
<div class="global-bar"><div class="global-fill" id="globalFill"></div></div>
<div class="global-info">
<div class="global-pct" id="globalPct">0%</div>
<div class="global-time" id="globalTime">--</div>
</div>
</div>

<!-- Stages -->
<div class="stage-list" id="stageList">
<div class="stage" id="stage1">
<div class="stage-header"><span class="stage-name"><span class="stage-dot" style="background:var(--stage1)"></span>网段解析</span><span class="stage-count" id="s1Count">--</span></div>
<div class="stage-bar"><div class="stage-fill" id="s1Fill" style="background:var(--stage1)"></div></div>
<div class="stage-footer"><span id="s1Est">预计 --</span><span id="s1Rem">--</span></div>
</div>
<div class="stage" id="stage2">
<div class="stage-header"><span class="stage-name"><span class="stage-dot" style="background:var(--stage2)"></span>IP 抽样</span><span class="stage-count" id="s2Count">--</span></div>
<div class="stage-bar"><div class="stage-fill" id="s2Fill" style="background:var(--stage2)"></div></div>
<div class="stage-footer"><span id="s2Est">预计 --</span><span id="s2Rem">--</span></div>
</div>
<div class="stage" id="stage3">
<div class="stage-header"><span class="stage-name"><span class="stage-dot" style="background:var(--stage3)"></span>并发探测</span><span class="stage-count" id="s3Count">--</span></div>
<div class="stage-bar"><div class="stage-fill" id="s3Fill" style="background:var(--stage3)"></div></div>
<div class="stage-footer"><span id="s3Est">预计 --</span><span id="s3Rem">--</span></div>
</div>
<div class="stage" id="stage4">
<div class="stage-header"><span class="stage-name"><span class="stage-dot" style="background:var(--stage4)"></span>过滤排序</span><span class="stage-count" id="s4Count">--</span></div>
<div class="stage-bar"><div class="stage-fill" id="s4Fill" style="background:var(--stage4)"></div></div>
<div class="stage-footer"><span id="s4Est">预计 --</span><span id="s4Rem">--</span></div>
</div>
</div>

<!-- Stats -->
<div class="stats-grid">
<div class="stat-item"><div class="stat-val brand" id="pAvail">0</div><div class="stat-lbl">有效节点</div></div>
<div class="stat-item"><div class="stat-val" id="pBestScore">-</div><div class="stat-lbl">最优延迟</div></div>
<div class="stat-item"><div class="stat-val brand" id="pBudget">0</div><div class="stat-lbl">探测预算</div></div>
<div class="stat-item"><div class="stat-val mono" id="pBestIP" style="font-size:12px;word-break:break-all;cursor:pointer" onclick="copyBestIP()">-</div><div class="stat-lbl">最优 IP（点击复制）</div></div>
<div class="stat-item"><div class="stat-val" id="pElapsed">0s</div><div class="stat-lbl">已用时间</div></div>
<div class="stat-item"><div class="stat-val" id="pNodes">0</div><div class="stat-lbl">搜索节点</div></div>
</div>

<div class="status-bar" id="statusBar">
<span class="spinner" id="statusSpinner"></span>
<span id="statusLabel">等待开始...</span>
<span class="scan-id" id="scanId"></span>
</div>
</div>

<!-- Error -->
<div id="error-msg" class="hidden error-box">
<svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm0 11a1 1 0 110-2 1 1 0 010 2zm-1-7h2v4H9V6z"/></svg>
<span id="errorText"></span>
</div>

<!-- Results -->
<div id="resultCard" class="card hidden">
<div class="card-title">扫描结果</div>
<div class="table-wrap">
<table>
<thead><tr><th>#</th><th>IP</th><th>延迟</th><th>速度</th><th>机房</th><th>所属网段</th><th>路由类型</th><th>路由追踪</th></tr></thead>
<tbody id="resultBody"></tbody>
</table>
</div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let curId=null, es=null, results=[], estStart=0;
const S=document.getElementById.bind(document);
const stageConfig=[
{id:'s1',total:1,label:'网段解析'},
{id:'s2',total:1,label:'IP抽样'},
{id:'s3',total:0,label:'并发探测'},
{id:'s4',total:1,label:'过滤排序'}
];

// Sync IP version selectors
document.getElementById('ipVersion').addEventListener('change', function() {
    document.getElementById('ipVersion2').value = this.value;
});
document.getElementById('ipVersion2').addEventListener('change', function() {
    document.getElementById('ipVersion').value = this.value;
});

// Preset buttons
document.querySelectorAll('.seg-btn').forEach(b=>{
b.addEventListener('click',()=>{
document.querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('active'));
b.classList.add('active');
if(b.dataset.cidrs) S('cidrs').value=b.dataset.cidrs;
if(b.dataset.budget) S('budget').value=b.dataset.budget;
if(b.dataset.concurrency) S('concurrency').value=b.dataset.concurrency;
});
});

// Menu
function toggleMenu(){
S('menuDrop').classList.toggle('show');
}
document.addEventListener('click',e=>{
if(!e.target.closest('.menu-wrap')) S('menuDrop').classList.remove('show');
});

// Presets
function applyPreset(name){
const presets={
sjc:{cidrs:'1.0.0.0/24\n1.1.1.0/24\n162.158.0.0/15',budget:2000,concurrency:200,host:'sjc.example.com'},
global:{cidrs:'1.0.0.0/16\n1.1.0.0/16\n162.158.0.0/15\n173.245.48.0/20',budget:5000,concurrency:200,host:'example.com'},
hkg:{cidrs:'1.0.0.0/24\n1.1.1.0/24\n103.21.244.0/22',budget:2000,concurrency:200,host:'hkg.example.com'}
};
const p=presets[name];
if(!p)return;
S('cidrs').value=p.cidrs;
S('budget').value=p.budget;
S('concurrency').value=p.concurrency;
S('host').value=p.host;
S('menuDrop').classList.remove('show');
showToast('已加载 '+({sjc:'SJC 美西',global:'全球全量',hkg:'香港优化'}[name])+' 预设');
}

// Local IP
async function fetchLocalIP(){
try{
S('liPublic').textContent='加载中...';
const r=await fetch('/api/local-ip');
const d=await r.json();
S('liPublic').textContent=d.publicIP||'--';
S('liLocal').textContent=d.localIPs&&d.localIPs.length?d.localIPs[0]:'--';
S('liISP').textContent=d.isp||'--';
S('liLocation').textContent=d.location||'--';
}catch(e){S('liPublic').textContent='获取失败'}
}
fetchLocalIP();

// ASN resolve
async function resolveASN(){
const asn=S('asn').value.trim();
if(!asn)return;
const btn=S('resolveBtn');
const ver=S('ipVersion').value;
btn.innerHTML='<div class="spinner" style="width:14px;height:14px;border-width:2px"></div>';
btn.disabled=true;
try{
const r=await fetch('/api/resolve-asn/'+asn+'?version='+ver);
const d=await r.json();
if(d.cidrs&&d.cidrs.length){
S('cidrs').value=d.cidrs.join('\n');
S('cidrs').scrollTop=S('cidrs').scrollHeight;
btn.innerHTML='<svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="#34C759" stroke-width="2"><path d="M4 10l4 4 8-8"/></svg>';
showToast('已添加 '+d.cidrs.length+' 条前缀');
}else{btn.innerHTML='<svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="#FF5F57" stroke-width="2"><path d="M5 5l10 10M15 5L5 15"/></svg>';showToast('未找到前缀');}
setTimeout(()=>{btn.innerHTML='<svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3l6 6-6 6M4 9h12"></svg>';btn.disabled=false;},2000);
}catch(e){btn.innerHTML='<svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="#FF5F57" stroke-width="2"><path d="M5 5l10 10M15 5L5 15"/></svg>';btn.disabled=false;showError('ASN 解析失败');}
}

// Start scan
async function startScan(){
const asn=S('asn').value.trim();
if(asn)await resolveASN();
const body={cidrs:S('cidrs').value.split('\n').map(s=>s.trim()).filter(Boolean),asn:parseInt(asn)||0,
budget:parseInt(S('budget').value)||2000,concurrency:parseInt(S('concurrency').value)||200,
heads:parseInt(S('heads').value)||4,beam:parseInt(S('beam').value)||32,
timeout:(parseFloat(S('timeout').value)||3)+'s',
host:S('host').value||'example.com',path:S('path').value||'/cdn-cgi/trace',
rounds:parseInt(S('rounds').value)||6,skipFirst:1,
downloadTop:parseInt(S('downloadTop').value)||5,downloadMode:S('downloadMode').value,
coloAllow:S('coloAllow').value.trim(),coloExclude:S('coloExclude').value.trim(),
ipVersion:parseInt(S('ipVersion').value)||0};
if(!body.cidrs.length&&!body.asn){showError('请输入 CIDR 或 ASN');return;}
hideError();
S('startBtn').disabled=true;
S('cancelBtn').classList.remove('hidden');
S('resultCard').classList.add('hidden');
S('resultBody').innerHTML='';
results=[];
estStart=Date.now();
resetStages();

try{
const r=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
const d=await r.json();
if(!d.id){showError('启动失败');return;}
curId=d.id;
S('scanId').textContent='#'+d.id.slice(-8);
S('progressCard').classList.remove('hidden');
S('pBudget').textContent=body.budget;
stageConfig[2].total=body.budget;
S('statusLabel').textContent='扫描中...';
S('statusSpinner').style.display='inline-block';

es=new EventSource('/api/scan/'+d.id+'?subscribe');
es.onmessage=e=>{
if(!e.data)return;
const p=JSON.parse(e.data);
updateProgress(p);
};
es.addEventListener('done',()=>{
es.close();
S('statusLabel').textContent='下载测速中...';
S('statusSpinner').style.display='inline-block';
pollResult(d.id);
});
}catch(e){showError('请求失败');S('startBtn').disabled=false;S('cancelBtn').classList.add('hidden');S('statusLabel').textContent='失败';S('statusSpinner').style.display='none';}
}

function resetStages(){
[1,2,3,4].forEach(i=>{
S('s'+i+'Fill').style.width='0%';
S('s'+i+'Count').textContent='--';
S('s'+i+'Est').textContent='预计 --';
S('s'+i+'Rem').textContent='--';
document.getElementById('stage'+i).querySelector('.stage-dot').className='stage-dot';
});
S('globalFill').style.width='0%';
S('globalPct').textContent='0%';
S('globalTime').textContent='--';
S('pAvail').textContent='0';
S('pBestScore').textContent='-';
S('pBestIP').textContent='-';
S('pElapsed').textContent='0s';
S('pNodes').textContent='0';
}

function updateProgress(p){
const stage=p.stage||3;
const budget=p.budget||2000;
const done=p.completed||0;
if(stage>=1){S('s1Fill').style.width='100%';S('s1Count').textContent='1/1';S('s1Est').textContent='预计 <1s';S('s1Rem').textContent='已完成';document.getElementById('stage1').querySelector('.stage-dot').className='stage-dot';S('s1Fill').style.width='100%';}
if(stage>=2){S('s2Fill').style.width='100%';S('s2Count').textContent='1/1';S('s2Est').textContent='预计 <1s';S('s2Rem').textContent='已完成';document.getElementById('stage2').querySelector('.stage-dot').className='stage-dot';S('s2Fill').style.width='100%';}
if(stage===3){
const pct=budget>0?Math.min(done/budget*100,100):0;
S('s3Fill').style.width=pct+'%';
S('s3Count').textContent=done+'/'+budget;
document.getElementById('stage3').querySelector('.stage-dot').className='stage-dot active';
const elapsed=(Date.now()-estStart)/1000;
const rate=done>0?elapsed/done:0;
const remain=rate*(budget-done);
S('s3Est').textContent='预计 '+fmtDur(elapsed+remain);
S('s3Rem').textContent='剩余 '+fmtDur(Math.max(0,remain));
const globalPct=Math.min(done/budget*75+25,100);
S('globalFill').style.width=globalPct+'%';
S('globalPct').textContent=Math.round(globalPct)+'%';
S('globalTime').textContent='总预计 '+fmtDur(elapsed+remain);
S('pAvail').textContent=p.nodes||done;
S('pBestScore').textContent=p.bestScore>0?p.bestScore.toFixed(1)+'ms':'-';
S('pBestIP').textContent=p.bestIP||'-';
S('pElapsed').textContent=fmtDur(elapsed);
S('pNodes').textContent=p.nodes||0;
}
if(stage>=4){
S('s4Fill').style.width='100%';S('s4Count').textContent='1/1';S('s4Est').textContent='预计 <1s';S('s4Rem').textContent='已完成';document.getElementById('stage4').querySelector('.stage-dot').className='stage-dot';S('s4Fill').style.width='100%';
S('globalFill').style.width='100%';S('globalPct').textContent='100%';S('globalTime').textContent='预计 '+fmtDur((Date.now()-estStart)/1000);
S('statusSpinner').style.display='none';
}
}

function fmtDur(s){if(s<60)return Math.round(s)+'s';const m=Math.floor(s/60);const sec=Math.round(s%60);return m+':'+(sec<10?'0':'')+sec;}

async function pollResult(id){
try{
const r=await fetch('/api/scan/'+id);
const d=await r.json();
if(d.status==='completed'){
renderResults(d.result||[]);
S('startBtn').disabled=false;
S('cancelBtn').classList.add('hidden');
S('statusLabel').textContent='完成';
S('statusSpinner').style.display='none';
showToast('扫描完成');
}else if(d.status==='failed'){
showError(d.error||'扫描失败');
S('startBtn').disabled=false;
S('cancelBtn').classList.add('hidden');
S('statusLabel').textContent='失败';
S('statusSpinner').style.display='none';
}else{setTimeout(()=>pollResult(id),1000);}
}catch(e){showError('获取结果失败');S('startBtn').disabled=false;S('cancelBtn').classList.add('hidden');S('statusSpinner').style.display='none';}
}

function cancelScan(){
if(!curId)return;
fetch('/api/cancel/'+curId);
if(es)es.close();
S('startBtn').disabled=false;
S('cancelBtn').classList.add('hidden');
S('statusLabel').textContent='已取消';
S('statusSpinner').style.display='none';
}

// Copy IP - click IP text to copy
function copyIP(ip){
if(!ip)return;
copyText(ip);
}

function copyBestIP(){
const ip=S('pBestIP').textContent.trim();
if(!ip||ip==='-')return;
copyText(ip);
}
function copyText(t){
if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>showToast('已复制: '+t));}
else{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制: '+t);}
}
function copyResults(){
if(!results.length){showToast('无结果可导出');return;}
const lines=results.map((r,i)=>(i+1)+','+r.ip+','+r.score_ms.toFixed(1)+','+(r.trace&&r.trace.colo?','+r.trace.colo:''));
const txt='# Vect Scan Results\n# IP,Score,Colo\n'+lines.join('\n');
copyText(txt);
showToast('已导出 '+results.length+' 条');
}

// Traceroute
const tracerouteCache={};
async function runTraceroute(ip,rowIdx){
if(tracerouteCache[ip]){
renderTraceroute(ip,tracerouteCache[ip],rowIdx);
return;
}
const trEl=S('tr_'+rowIdx);
if(trEl)trEl.innerHTML='<span style="color:var(--muted)">追踪中...</span>';
try{
const r=await fetch('/api/traceroute/'+ip);
const hops=await r.json();
tracerouteCache[ip]=hops;
renderTraceroute(ip,hops,rowIdx);
}catch(e){
if(trEl)trEl.innerHTML='<span style="color:var(--danger)">失败</span>';
}
}

function renderTraceroute(ip,hops,rowIdx){
const trEl=S('tr_'+rowIdx);
if(!trEl||!hops||!hops.length){if(trEl)trEl.innerHTML='<span style="color:var(--muted)">无路由</span>';return;}
let html='<div class="trace-wrap">';
hops.forEach(h=>{
if(h.lost)html+='<div class="trace-row"><span class="trace-hop">'+h.hop+'</span><span class="trace-lost">*</span></div>';
else html+='<div class="trace-row"><span class="trace-hop">'+h.hop+'</span><span class="trace-ip">'+h.ip+'</span><span class="trace-ms">'+(h.ms||'')+'</span></div>';
});
html+='</div>';
trEl.innerHTML=html;
}

function getRouteClass(route){
if(!route)return 'route-normal';
const r=route.toLowerCase();
if(r.includes('premium'))return 'route-premium';
if(r.includes('optimized'))return 'route-optimized';
return 'route-normal';
}

function formatRoute(route){
if(!route)return '-';
const parts=route.split('|');
return parts[parts.length-1]||route;
}

function renderResults(r){
results=r;
const tb=S('resultBody');
if(!r.length){tb.innerHTML='<tr><td colspan="8"><div class="empty-state">无结果</div></td></tr>';S('resultCard').classList.remove('hidden');return;}
let html='';
r.forEach((x,i)=>{
const colo=x.trace&&x.trace.colo?x.trace.colo:'';
const prefix=x.prefix||'';
const dlOk=x.download_ok;
const dl=dlOk?x.download_mbps.toFixed(1)+' Mbps':'-';
const latency=x.score_ms.toFixed(1)+'<span class="score-unit">ms</span>';
const route=x.trace&&x.trace.route?x.trace.route:'';
const routeLabel=formatRoute(route);
const routeClass=getRouteClass(route);
html+='<tr><td style="color:var(--muted)">'+(i+1)+'</td>'
+'<td class="ip-cell" onclick="copyIP(\''+x.ip+'\')" title="点击复制">'+x.ip+'</td>'
+'<td class="score-num">'+latency+'</td>'
+'<td style="font-size:12px;font-weight:'+(dlOk?'600':'400')+';color:'+(dlOk?'#34C759':'var(--muted)')+'">'+dl+'</td>'
+'<td>'+(colo?'<span class="colo-badge">'+colo+'</span>':'<span style="color:var(--muted)">-</span>')+'</td>'
+'<td style="color:var(--muted);font-size:12px;font-family:\'SF Mono\',ui-monospace,monospace">'+prefix+'</td>'
+'<td><span class="'+routeClass+'">'+routeLabel+'</span></td>'
+'<td><span style="color:var(--brand);cursor:pointer;font-size:11px" onclick="runTraceroute(\''+x.ip+'\','+i+')">追踪</span><div id="tr_'+i+'"></div></td></tr>';
});
tb.innerHTML=html;
S('resultCard').classList.remove('hidden');
}

function showToast(m){
const t=S('toast');t.textContent=m;t.classList.add('show');
clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
function showError(m){
S('errorText').textContent=m;S('error-msg').classList.remove('hidden');
}
function hideError(){
S('error-msg').classList.add('hidden');
}
</script>
</body>
</html>
