<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Vect">
<link rel="manifest" href="/manifest.json">
<title>Vect - Monte Carlo IP Selector</title>
<style>
:root{--bg:#F8F8FA;--glass-bg:rgba(255,255,255,0.72);--glass-border:rgba(0,0,0,0.06);--glass-shadow:0 2px 20px rgba(0,0,0,0.04),0 0 0 0.5px rgba(0,0,0,0.02);--primary:#0077ED;--danger:#E53935;--success:#34C759;--text:#1C1C1E;--secondary:#8E8E93;--muted:#C7C7CC;--muted2:#8E8E93;--input-bg:rgba(118,118,128,0.10);--segment-bg:rgba(118,118,128,0.10);--tabbar-bg:rgba(248,248,250,0.82);--tabbar-border:rgba(0,0,0,0.08);--nav-bg:rgba(248,248,250,0.82);--progress-track:rgba(118,118,128,0.12);--progress-fill:#0077ED;--overlay:rgba(0,0,0,0.15);--radius-card:20px;--radius-btn:18px;--radius-input:10px;--radius-seg:12px}
[data-theme="dark"]{--bg:#121419;--glass-bg:rgba(30,34,44,0.68);--glass-border:rgba(255,255,255,0.06);--glass-shadow:0 2px 24px rgba(0,0,0,0.3),0 0 0 0.5px rgba(255,255,255,0.04);--primary:#4294FF;--danger:#FF5F57;--text:#FFFFFF;--secondary:#8E8E93;--muted:#636366;--input-bg:rgba(118,118,128,0.20);--segment-bg:rgba(118,118,128,0.18);--tabbar-bg:rgba(18,20,25,0.80);--tabbar-border:rgba(255,255,255,0.08);--nav-bg:rgba(18,20,25,0.80);--progress-track:rgba(118,118,128,0.20);--overlay:rgba(0,0,0,0.5)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','SF Pro',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.hidden{display:none!important}

/* ===== Top Nav ===== */
.top-nav{position:sticky;top:0;z-index:50;padding:12px 16px 10px;padding-top:calc(env(safe-area-inset-top) + 12px);background:var(--nav-bg);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-bottom:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between}
.nav-left{display:flex;align-items:baseline;gap:8px}
.nav-title{font-size:22px;font-weight:650;letter-spacing:-0.3px;color:var(--text)}
.nav-sub{font-size:13px;font-weight:400;color:var(--secondary);letter-spacing:-0.1px}
.nav-right{display:flex;align-items:center;gap:6px}
.nav-sp{font-size:13px;font-weight:500;color:var(--primary);background:rgba(0,119,237,0.08);border:none;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:background .15s}
.nav-sp:hover{background:rgba(0,119,237,0.15)}

/* ===== Glass Card ===== */
.glass-card{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--glass-border);border-radius:var(--radius-card);padding:16px 16px 18px;margin-bottom:14px;box-shadow:var(--glass-shadow);transition:all .25s}
.card-title{font-size:17px;font-weight:600;letter-spacing:-0.2px;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* ===== Page Content ===== */
.page-content{padding:14px 16px;padding-bottom:calc(env(safe-area-inset-bottom) + 90px);max-width:375px;margin:0 auto}

/* ===== Tabs ===== */
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ===== Bottom TabBar ===== */
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--tabbar-bg);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:0.5px solid var(--tabbar-border);padding:6px 16px;padding-bottom:calc(env(safe-area-inset-bottom) + 6px);display:flex;justify-content:space-around;align-items:flex-start}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;color:var(--secondary);cursor:pointer;padding:4px 0;font-family:inherit;transition:color .15s;-webkit-tap-highlight-color:transparent}
.tab-item.active,.tab-item:active{color:var(--primary)}
.tab-item svg{width:24px;height:24px;display:block}
.tab-item .tab-label{font-size:10px;font-weight:500;letter-spacing:0.2px}
.tab-item.active .tab-label{color:var(--primary)}

/* ===== Segmented Capsule ===== */
.segmented{display:flex;background:var(--segment-bg);border-radius:var(--radius-seg);padding:2px;margin-bottom:12px;gap:2px}
.seg-btn{flex:1;padding:7px 8px;border:none;border-radius:10px;background:transparent;color:var(--secondary);font-size:14px;font-weight:500;cursor:pointer;transition:all .25s cubic-bezier(0.25,0.1,0.25,1);font-family:inherit;line-height:1.3;letter-spacing:-0.1px}
.seg-btn.active{background:var(--primary);color:#FFFFFF;font-weight:600;box-shadow:0 2px 8px rgba(0,119,237,0.25)}
.seg-btn:hover:not(.active){color:var(--text)}

/* ===== Inputs ===== */
.field{margin-bottom:10px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:13px;font-weight:500;color:var(--secondary);margin-bottom:5px;letter-spacing:-0.1px}
.field input,.field select{width:100%;height:40px;padding:0 12px;background:var(--input-bg);border:0.5px solid transparent;border-radius:var(--radius-input);color:var(--text);font-size:16px;font-weight:600;outline:none;transition:all .2s;font-family:inherit;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,119,237,0.12)}
.field input::placeholder{color:var(--muted);font-weight:400;font-size:13px}
.field select{background-image:url("data:image/svg+xml,%3Csvg width='9' height='5' fill='%238E8E93' viewBox='0 0 9 5'%3E%3Cpath d='M1 1l3.5 3L8 1'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:30px;font-size:13px;font-weight:500;color:var(--text)}
textarea{width:100%;min-height:58px;padding:9px 12px;background:var(--input-bg);border:0.5px solid transparent;border-radius:var(--radius-input);color:var(--text);font-size:13px;font-family:'SF Mono',ui-monospace,monospace;resize:vertical;outline:none;line-height:1.5;transition:all .2s}
textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,119,237,0.12)}
.input-group{display:flex;gap:5px}
.input-group input{flex:1}
.input-group .btn-icon{height:40px;width:40px;border-radius:var(--radius-input);border:0.5px solid rgba(0,0,0,0.04);background:var(--input-bg);color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.input-group .btn-icon:hover{color:var(--primary);background:rgba(0,119,237,0.08)}

/* ===== Row (dual column) ===== */
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}
.row .field{margin-bottom:0}

/* ===== Colo Filter ===== */
.colo-filter{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.colo-filter .colo-trigger{height:40px;padding:0 12px;background:var(--input-bg);border:0.5px solid transparent;border-radius:var(--radius-input);color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s;font-family:inherit}
.colo-filter .colo-trigger:hover{border-color:var(--primary)}
.colo-filter .colo-trigger .placeholder{color:var(--muted2)}
.colo-filter .colo-trigger svg{color:var(--muted2);flex-shrink:0}
.colo-filter input{height:40px;padding:0 12px;background:var(--input-bg);border:0.5px solid transparent;border-radius:var(--radius-input);color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:all .2s}
.colo-filter input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,119,237,0.12)}
.colo-filter input::placeholder{color:var(--muted2)}
.colo-field{position:relative}
.colo-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--glass-bg);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:0.5px solid var(--glass-border);border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,0.12);z-index:100;max-height:240px;overflow-y:auto;display:none}
.colo-dropdown.show{display:block}
.colo-dropdown .mode-row{display:flex;padding:8px 8px 6px;gap:6px;border-bottom:0.5px solid var(--glass-border)}
.colo-dropdown .mode-btn{flex:1;height:30px;border-radius:8px;border:0.5px solid transparent;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;background:var(--input-bg);color:var(--secondary)}
.colo-dropdown .mode-btn.active{background:var(--primary);color:#FFF;border-color:var(--primary)}
.colo-dropdown .colo-list{max-height:140px;overflow-y:auto}
.colo-dropdown .colo-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;transition:background .1s;font-size:12px;color:var(--text)}
.colo-dropdown .colo-item:hover{background:var(--input-bg)}
.colo-dropdown .colo-item .colo-count{font-size:10px;color:var(--muted2)}
.colo-dropdown .colo-item.selected{background:rgba(0,119,237,0.08);color:var(--primary)}
.colo-dropdown .empty{text-align:center;padding:14px;font-size:11px;color:var(--muted2)}
.colo-dropdown .manual-input{padding:5px 8px 8px;border-top:0.5px solid var(--glass-border)}
.colo-dropdown .manual-input input{width:100%;height:30px;padding:0 8px;background:var(--input-bg);border:0.5px solid transparent;border-radius:6px;color:var(--text);font-size:11px;outline:none;font-family:inherit}

/* ===== Button ===== */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--radius-btn);font-size:17px;font-weight:590;cursor:pointer;transition:all .25s cubic-bezier(0.25,0.1,0.25,1);font-family:inherit;height:54px;width:100%;letter-spacing:0.2px}
.btn-primary{background:var(--primary);color:#FFFFFF;box-shadow:0 4px 14px rgba(0,119,237,0.30)}
.btn-primary:active{transform:scale(0.97);opacity:0.9}
.btn-primary:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none;transform:none}
.btn-danger{background:var(--danger);color:#FFFFFF;box-shadow:0 4px 14px rgba(229,57,53,0.30)}
.btn-danger:active{transform:scale(0.97);opacity:0.9}
.btn-danger.hidden{display:none}
.btn-spacer{margin-top:64px;margin-bottom:12px}

/* ===== Status Overview ===== */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.stat-item{text-align:center;padding:6px 4px}
.stat-val{font-size:20px;font-weight:650;color:var(--text);line-height:1.3;letter-spacing:-0.3px}
.stat-val.brand{color:var(--primary)}
.stat-val.mono{font-family:'SF Mono',ui-monospace,monospace;font-size:14px}
.stat-lbl{font-size:11px;color:var(--muted2);margin-top:1px;letter-spacing:-0.1px}
.copy-btn{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:5px;border:none;background:rgba(0,119,237,0.10);color:var(--primary);font-size:9px;cursor:pointer;font-family:inherit;margin-left:3px;vertical-align:middle;font-weight:500}
.copy-btn:hover{background:rgba(0,119,237,0.18)}

/* ===== Stage Progress ===== */
.stage-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;margin-top:6px}
.stage-item{padding:8px 10px}
.stage-item .stage-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.stage-item .stage-name{font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px}
.stage-item .stage-count{font-size:11px;color:var(--muted2);font-variant-numeric:tabular-nums}
.stage-item .stage-bar{height:4px;background:var(--progress-track);border-radius:2px;overflow:hidden;margin-bottom:3px}
.stage-item .stage-fill{height:100%;border-radius:2px;background:var(--progress-fill);transition:width .5s ease;width:0%}
.stage-item .stage-footer{display:flex;justify-content:space-between;font-size:10px;color:var(--muted2)}

/* ===== Error ===== */
.error-box{display:flex;align-items:center;gap:6px;padding:10px 12px;background:rgba(229,57,53,0.06);border:0.5px solid rgba(229,57,53,0.15);border-radius:12px;color:var(--danger);font-size:12px;margin-bottom:10px}
.error-box.hidden{display:none}
.error-box svg{width:14px;height:14px;flex-shrink:0}

/* ===== Local Network ===== */
.local-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px}
.local-item{padding:4px 0}
.local-label{font-size:11px;color:var(--muted2);margin-bottom:1px;letter-spacing:-0.1px}
.local-val{font-size:18px;font-weight:650;color:var(--text);letter-spacing:-0.3px}
.local-val.public{color:var(--primary)}

/* ===== History ===== */
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.history-header .count{font-size:12px;color:var(--muted2)}
.history-header .clear-btn{font-size:12px;color:var(--danger);cursor:pointer;background:none;border:none;font-family:inherit;font-weight:500;padding:4px 8px;border-radius:6px;transition:background .15s}
.history-header .clear-btn:hover{background:rgba(229,57,53,0.08)}
.history-list{display:flex;flex-direction:column;gap:10px}
.history-item{padding:12px 14px}
.history-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.history-item .h-time{font-size:11px;color:var(--muted2)}
.history-item .ip{font-size:20px;font-weight:650;color:var(--primary);cursor:pointer;font-family:'SF Mono',ui-monospace,monospace;letter-spacing:-0.3px}
.history-item .ip:active{opacity:0.7}
.history-item .del-btn{width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.history-item .del-btn:active{background:rgba(229,57,53,0.12);color:var(--danger)}
.history-metrics{display:flex;flex-wrap:wrap;gap:4px 14px}
.history-metrics .hm{font-size:12px;color:var(--secondary);letter-spacing:-0.1px}
.history-metrics .hm strong{font-weight:590;color:var(--text)}
.history-metrics .hm .ok{color:var(--success)}
.history-metrics .hm .fail{color:var(--muted2)}
.history-empty{text-align:center;padding:36px 16px;color:var(--muted2);font-size:13px}

/* ===== Traceroute ===== */
.trace-wrap{background:var(--input-bg);border-radius:10px;padding:6px 10px;max-height:150px;overflow-y:auto;margin-top:6px}
.trace-row{display:flex;gap:5px;font-size:10px;font-family:'SF Mono',ui-monospace,monospace;padding:2px 0}
.trace-hop{color:var(--muted2);width:20px;flex-shrink:0}
.trace-ip{color:var(--secondary);flex:1}
.trace-ms{color:var(--primary);width:42px;text-align:right;flex-shrink:0}
.trace-lost{color:var(--danger)}

/* ===== Settings Tab ===== */
.settings-group{margin-bottom:16px}
.settings-group:last-child{margin-bottom:0}
.settings-group .sg-title{font-size:13px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding:0 2px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:8px 2px;min-height:44px}
.settings-row .sl-label{font-size:15px;font-weight:400;color:var(--text)}
.settings-row .sl-desc{font-size:11px;color:var(--muted2);margin-top:1px}
.toggle-wrap{position:relative;width:44px;height:28px;flex-shrink:0;margin-left:12px}
.toggle-track{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:14px;background:var(--muted);cursor:pointer;transition:background .25s}
.toggle-track.on{background:var(--primary)}
.toggle-knob{position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:12px;background:#FFF;box-shadow:0 1px 4px rgba(0,0,0,0.15);transition:transform .25s cubic-bezier(0.25,0.1,0.25,1);cursor:pointer}
.toggle-track.on .toggle-knob{transform:translateX(16px)}
.toggle-input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;z-index:2}
.settings-btn-theme{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;border:0.5px solid var(--glass-border);border-radius:12px;background:var(--glass-bg);backdrop-filter:blur(10px);color:var(--text);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.settings-btn-theme:active{background:var(--input-bg)}

/* ===== SP Preset ===== */
.sp-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.sp-chip{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;border:0.5px solid var(--glass-border);background:var(--input-bg);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.sp-chip:active{background:rgba(0,119,237,0.10);border-color:var(--primary);color:var(--primary)}

/* ===== Toast ===== */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 100px);left:50%;transform:translateX(-50%);background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--glass-border);border-radius:12px;padding:8px 18px;font-size:13px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.08);z-index:200;transition:opacity .25s;opacity:0;pointer-events:none}
.toast.show{opacity:1}

/* ===== Section divider inside glass card ===== */
.section{border-top:0.5px solid var(--glass-border);padding-top:10px;margin-top:10px}
.section:first-child{border-top:none;padding-top:0;margin-top:0}

/* ===== Responsive ===== */
@media(max-width:420px){.page-content{max-width:100%;padding-left:14px;padding-right:14px}.row{grid-template-columns:1fr}.colo-filter{grid-template-columns:1fr}}

/* ===== Discover button ===== */
.discover-chip{padding:6px 10px;border-radius:8px;border:0.5px solid var(--glass-border);background:var(--input-bg);color:var(--primary);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.discover-chip:active{background:rgba(0,119,237,0.10)}
</style>
</head>
<body>

<!-- Top Nav -->
<div class="top-nav">
<div class="nav-left">
<div class="nav-title">Vect</div>
<div class="nav-sub">Monte Carlo IP Selector</div>
</div>
<div class="nav-right">
<button class="nav-sp" onclick="showSPPreset()" id="spBtn">SP</button>
</div>
</div>

<!-- Page Content -->
<div class="page-content">

<!-- ============ SCAN TAB ============ -->
<div class="tab-content active" id="tab-scan">

<!-- Status Overview -->
<div class="glass-card" id="localIPCard">
<div class="card-title">本地网络</div>
<div class="local-grid" id="localInfo">
<div class="local-item"><div class="local-label">公网 IP</div><div class="local-val public" id="liPublic">--</div></div>
<div class="local-item"><div class="local-label">本地 IP</div><div class="local-val" id="liLocal">--</div></div>
<div class="local-item"><div class="local-label">运营商</div><div class="local-val" id="liISP">--</div></div>
<div class="local-item"><div class="local-label">地理位置</div><div class="local-val" id="liLocation">--</div></div>
</div>
</div>

<!-- Scan Config -->
<div class="glass-card">
<div class="card-title">扫描配置</div>
<div class="segmented">
<button class="seg-btn" data-cidrs="1.1.1.0/24&#10;1.0.0.0/24&#10;1.2.0.0/16&#10;1.3.0.0/16" data-budget="2000" data-concurrency="200">Quick</button>
<button class="seg-btn" data-cidrs="1.1.0.0/16&#10;1.0.0.0/16&#10;1.2.0.0/16&#10;1.3.0.0/16&#10;162.158.0.0/15&#10;173.245.48.0/20" data-budget="5000" data-concurrency="200">Full</button>
</div>

<div class="section">
<div class="field">
<label>CIDR 前缀（每行一个）</label>
<textarea id="cidrs" placeholder="1.1.1.0/24&#10;2606:4700::/32"></textarea>
</div>
</div>

<div class="section">
<div class="field">
<label>ASN 自动解析</label>
<div class="input-group">
<input id="asn" type="number" placeholder="例如 13335">
<button class="btn-icon" id="resolveBtn" onclick="resolveASN()" aria-label="解析 ASN">
<svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3l6 6-6 6M4 9h12"/></svg>
</button>
</div>
</div>
</div>

<div class="section">
<div class="row">
<div class="field"><label>IP 版本</label>
<select id="ipVersion"><option value="0">IPv4 + IPv6</option><option value="4">仅 IPv4</option><option value="6">仅 IPv6</option></select>
</div>
<div class="field"><label>探测预算</label><input id="budget" type="number" value="2000"></div>
</div>
<div class="row" style="margin-top:8px">
<div class="field"><label>并发数</label><input id="concurrency" type="number" value="200"></div>
<div class="field"><label>保留 TOP</label><input id="topN" type="number" value="20"></div>
</div>
<div class="row" style="margin-top:8px">
<div class="field"><label>带宽测速 TOP</label><input id="downloadTop" type="number" value="5"></div>
<div class="field"><label>测速模式</label>
<select id="downloadMode"><option value="all" selected>固定数量</option><option value="sequential">Sequential</option></select>
</div>
</div>

<div class="section">
<div class="field">
<label>机房过滤</label>
<div class="colo-filter">
<div class="colo-field">
<div class="colo-trigger" id="coloToggle" onclick="toggleColoDropdown()">
<span class="placeholder" id="coloLabel">关闭</span>
<svg width="9" height="5" fill="currentColor" viewBox="0 0 9 5"><path d="M1 1l3.5 3L8 1"/></svg>
</div>

<button class="mode-btn" data-mode="allow" onclick="setColoMode(this,'allow')">白名单</button>
<button class="mode-btn" data-mode="exclude" onclick="setColoMode(this,'exclude')">黑名单</button>
</div>

<input id="coloInput" placeholder="HKG·香港, SJC·圣何塞, NRT·东京">

发现机房
</button>
</div>
</div>

<span id="errorText"></span>
</div>

开始扫描
</button>
<button class="btn btn-danger hidden" id="cancelBtn" onclick="cancelScan()">
<svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M5 5l10 10M15 5L5 15"/></svg>
停止扫描
</button>
</div>

<!-- Status Panel (inline in scan tab) -->

<div class="stage-footer"><span id="s2Est">预计 --</span><span id="s2Rem">--</span></div>
</div>
<div class="stage-item">
<div class="stage-top"><span class="stage-name">并发探测</span><span class="stage-count" id="s3Count">--</span></div>
<div class="stage-bar"><div class="stage-fill" id="s3Fill"></div></div>
<div class="stage-footer"><span id="s3Est">预计 --</span><span id="s3Rem">--</span></div>
</div>
<div class="stage-item">
<div class="stage-top"><span class="stage-name">筛选排序</span><span class="stage-count" id="s4Count">--</span></div>
<div class="stage-bar"><div class="stage-fill" id="s4Fill"></div></div>
<div class="stage-footer"><span id="s4Est">预计 --</span><span id="s4Rem">--</span></div>
</div>
</div>

<div class="status-grid">
<div class="stat-item"><div class="stat-val brand" id="pAvail">0</div><div class="stat-lbl">已完成</div></div>
<div class="stat-item"><div class="stat-val" id="pBestScore">-</div><div class="stat-lbl">最优延迟</div></div>
<div class="stat-item"><div class="stat-val mono" id="pBestIP" style="font-size:13px;word-break:break-all;cursor:pointer">-<button class="copy-btn" onclick="copyBestIP()">复制</button></div><div class="stat-lbl">最优 IP</div></div>
<div class="stat-item"><div class="stat-val" id="pElapsed">0s</div><div class="stat-lbl">总用时</div></div>
</div>

</div>
</div>

<span id="themeLabel">深色模式</span>
</button>

<!-- Bottom TabBar -->
<div class="tab-bar">
<button class="tab-item active" data-tab="scan" onclick="switchTab('scan')">

<span class="tab-label">扫描</span>
</button>

<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3M8 3l-4 4M16 3l4 4"/></svg>
<span class="tab-label">历史</span>
</button>
<button class="tab-item" data-tab="settings" onclick="switchTab('settings')">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
<span class="tab-label">设置</span>
</button>

<script>
let curId=null, es=null, results=[], estStart=0, coloMode='', coloSelected=[], coloData=[];
let tracerouteEnabled=localStorage.getItem('vect-traceroute')==='1';
const S=document.getElementById.bind(document);
const stageConfig=[
{id:'s1',total:1,label:'网段解析'},
{id:'s2',total:1,label:'IP抽样'},
{id:'s3',total:0,label:'并发探测'},
{id:'s4',total:1,label:'筛选排序'}
];

// Tab switching
function switchTab(name){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
S('tab-'+name).classList.add('active');
document.querySelector('.tab-item[data-tab="'+name+'"]').classList.add('active');
}

// Theme
const storedTheme=localStorage.getItem('vect-theme')||'light';
document.documentElement.setAttribute('data-theme',storedTheme);
updateThemeIcon(storedTheme);
function toggleTheme(){
const cur=document.documentElement.getAttribute('data-theme');
const next=cur==='light'?'dark':'light';
document.documentElement.setAttribute('data-theme',next);
localStorage.setItem('vect-theme',next);
updateThemeIcon(next);
}
function updateThemeIcon(theme){
const icon=S('themeIcon');
const label=S('themeLabel');
if(theme==='light'){if(icon)icon.innerHTML='<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';if(label)label.textContent='深色模式';}
else{if(icon)icon.innerHTML='<path d="M4 12a8 8 0 1016 0 8 8 0 00-16 0zm6-9v2m0 14v2m-5-3l1.5-1.5M16.5 7.5L18 6m-12 0l1.5 1.5M16.5 16.5L18 18"/>';if(label)label.textContent='浅色模式';}
}

// Traceroute toggle
function toggleTraceroute(){
tracerouteEnabled=!tracerouteEnabled;
localStorage.setItem('vect-traceroute',tracerouteEnabled?'1':'0');
updateTracerouteUI();
}
function updateTracerouteUI(){
const track=S('tracerouteTrack');
const toggle=S('tracerouteToggle');
if(track)track.classList.toggle('on',tracerouteEnabled);
if(toggle)toggle.checked=tracerouteEnabled;
}

// SP Preset modal
function showSPPreset(){
const html='<div style="display:flex;gap:6px;flex-wrap:wrap">'+
'<button class="sp-chip" onclick="applySP(2000,200,\'1.1.1.0/24\\n1.0.0.0/24\')">Cloudflare</button>'+
'<button class="sp-chip" onclick="applySP(5000,200,\'1.1.0.0/16\\n1.0.0.0/16\\n162.158.0.0/15\')">Cloudflare Full</button>'+
'<button class="sp-chip" onclick="applySP(3000,150,\'8.8.8.0/24\\n8.8.4.0/24\')">Google DNS</button>'+
'</div>';
showToast('选择预设');
showToast('暂不支持弹窗，请在设置中调整');
}

function applySP(budget,concurrency,cidrs){
S('budget').value=budget;
S('concurrency').value=concurrency;
S('cidrs').value=cidrs;
switchTab('scan');
showToast('已应用预设');
}

// Segmented buttons
document.querySelectorAll('.seg-btn').forEach(b=>{
b.addEventListener('click',()=>{
document.querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('active'));
b.classList.add('active');
if(b.dataset.cidrs) S('cidrs').value=b.dataset.cidrs;
if(b.dataset.budget) S('budget').value=b.dataset.budget;
if(b.dataset.concurrency) S('concurrency').value=b.dataset.concurrency;
});
});
if(document.querySelector('.seg-btn'))document.querySelector('.seg-btn').classList.add('active');

// Local IP
async function fetchLocalIP(){
try{
S('liPublic').textContent='加载中...';
const r=await fetch('/api/local-ip');
const d=await r.json();
S('liPublic').textContent=d.publicIP||'--';
S('liLocal').textContent=d.localIPs&&d.localIPs.length?d.localIPs[0]:'--';
S('liISP').textContent=d.isp||'--';
S('liLocation').textContent=d.location||'--';
}catch(e){S('liPublic').textContent='获取失败'}
}
fetchLocalIP();

// ASN resolve
async function resolveASN(){
const asn=S('asn').value.trim();
if(!asn)return;
const btn=S('resolveBtn');
const ver=S('ipVersion').value;
btn.innerHTML='<div class="spinner" style="width:14px;height:14px;border:2px solid var(--glass-border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;display:inline-block"></div>';
btn.disabled=true;
try{
const r=await fetch('/api/resolve-asn/'+asn+'?version='+ver);
const d=await r.json();
if(d.cidrs&&d.cidrs.length){
S('cidrs').value=d.cidrs.join('\n');
S('cidrs').scrollTop=S('cidrs').scrollHeight;
btn.innerHTML='<svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="#34C759" stroke-width="2"><path d="M4 10l4 4 8-8"/></svg>';
showToast('已添加 '+d.cidrs.length+' 条前缀');
S('coloDiscoverSection').style.display='';
S('coloList').innerHTML='<div class="empty">请先发现机房</div>';
}else{btn.innerHTML='<svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="#E53935" stroke-width="2"><path d="M5 5l10 10M15 5L5 15"/></svg>';showToast('未找到前缀');}
setTimeout(()=>{btn.innerHTML='<svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3l6 6-6 6M4 9h12"></svg>';btn.disabled=false;},2000);
}catch(e){btn.innerHTML='<svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="#E53935" stroke-width="2"><path d="M5 5l10 10M15 5L5 15"/></svg>';btn.disabled=false;showError('ASN 解析失败');}
}

async function discoverColos(){
const cidrs=S('cidrs').value.split('\n').map(s=>s.trim()).filter(Boolean);
if(!cidrs.length){showError('请先输入 CIDR 或解析 ASN');return;}
const btn=S('discoverBtn');
btn.disabled=true;
btn.innerHTML='<div class="spinner" style="width:10px;height:10px;border:1.5px solid var(--glass-border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:4px"></div>发现中...';
try{
const r=await fetch('/api/colo-discover',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cidrs})});
const list=await r.json();
if(!list||!list.length){S('coloList').innerHTML='<div class="empty">未发现机房</div>';return;}
coloData=list;
let html='';
list.forEach(e=>{html+='<div class="colo-item" data-colo="'+e.colo+'" onclick="toggleColoItem(this,\''+e.colo+'\')">'+e.colo+'<span class="colo-count">'+e.count+'</span></div>';});
S('coloList').innerHTML=html;
showToast('发现 '+list.length+' 个机房');
}catch(e){showError('机房发现失败');}
btn.disabled=false;
btn.innerHTML='<svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/><path d="M10 2v16M2 10h16"/></svg>发现机房';
}

// Colo dropdown
function toggleColoDropdown(){S('coloDropdown').classList.toggle('show')}
document.addEventListener('click',e=>{if(!e.target.closest('.colo-field'))S('coloDropdown').classList.remove('show')});

function setColoMode(el,mode){
S('coloDropdown').querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
coloMode=mode;
const labels={off:'关闭',allow:'白名单',exclude:'黑名单'};
S('coloLabel').textContent=labels[mode]||'关闭';
if(mode===''){coloSelected=[];S('coloDropdown').querySelectorAll('.colo-item').forEach(i=>i.classList.remove('selected'));}
updateColoInput();
}

function toggleColoItem(el,colo){
if(!coloMode)return;
const idx=coloSelected.indexOf(colo);
if(idx>=0){coloSelected.splice(idx,1);el.classList.remove('selected');}
else{coloSelected.push(colo);el.classList.add('selected');}
updateColoInput();
}

function updateColoInput(){
const manual=S('coloInput');
if(!coloMode||!coloSelected.length){manual.value='';manual.placeholder=coloMode==='allow'?'请选择机房':coloMode==='exclude'?'请选择机房':'关闭';return;}
manual.value=coloSelected.join(', ');
S('coloLabel').textContent=coloMode==='allow'?'允许: '+coloSelected.length+' 个':'排除: '+coloSelected.length+' 个';
}

function applyManualColos(){
if(!coloMode)return;
const raw=S('coloManual').value.trim();
if(!raw){if(!coloData.length)coloSelected=[];updateColoInput();return;}
const manual=raw.split(',').map(s=>s.trim().split('·')[0].trim().toUpperCase()).filter(Boolean);
coloSelected=manual;
S('coloInput').value=manual.join(', ');
S('coloLabel').textContent=coloMode==='allow'?'允许: '+manual.length+' 个':'排除: '+manual.length+' 个';
}

// Start scan
async function startScan(){
const asn=S('asn').value.trim();
if(asn)await resolveASN();
const body={cidrs:S('cidrs').value.split('\n').map(s=>s.trim()).filter(Boolean),asn:parseInt(asn)||0,
budget:parseInt(S('budget').value)||2000,concurrency:parseInt(S('concurrency').value)||200,
heads:parseInt(S('heads').value)||4,beam:parseInt(S('beam').value)||32,
timeout:(parseFloat(S('timeout').value)||3)+'s',
host:S('host').value||'example.com',path:S('path').value||'/cdn-cgi/trace',
rounds:parseInt(S('rounds').value)||6,skipFirst:1,
downloadTop:parseInt(S('downloadTop').value)||0,downloadMode:S('downloadMode').value,
coloAllow:coloMode==='allow'?coloSelected.join(','):'',
coloExclude:coloMode==='exclude'?coloSelected.join(','):'',
ipVersion:parseInt(S('ipVersion').value)||0};
if(!body.cidrs.length&&!body.asn){showError('请输入 CIDR 或 ASN');return;}
hideError();
S('startBtn').disabled=true;
S('startBtn').classList.add('hidden');
S('cancelBtn').classList.remove('hidden');
S('statusPanel').style.display='';
resetStages();
estStart=Date.now();

try{
const r=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
const d=await r.json();
if(!d.id){showError('启动失败');return;}
curId=d.id;
S('scanId').textContent='#'+d.id.slice(-8);
S('pBestScore').textContent='-';

es=new EventSource('/api/scan/'+d.id+'?subscribe');
es.onmessage=e=>{
if(!e.data)return;
const p=JSON.parse(e.data);
updateProgress(p);
};
es.addEventListener('done',()=>{
es.close();
S('statusLabel').textContent='下载测速中...';
pollResult(d.id);
});
}catch(e){showError('请求失败');resetButtons();}
}

function resetStages(){
[1,2,3,4].forEach(i=>{
S('s'+i+'Fill').style.width='0%';
S('s'+i+'Count').textContent='--';
S('s'+i+'Est').textContent='预计 --';
S('s'+i+'Rem').textContent='--';
});
S('pAvail').textContent='0';
S('pBestScore').textContent='-';
S('pBestIP').textContent='-';
S('pElapsed').textContent='0s';
S('statusLabel').textContent='扫描中...';
}

function updateProgress(p){
const stage=p.stage||3;
const budget=p.budget||2000;
const done=p.completed||0;
if(stage>=1){S('s1Fill').style.width='100%';S('s1Count').textContent='1/1';S('s1Est').textContent='<1s';S('s1Rem').textContent='已完成';}
if(stage>=2){S('s2Fill').style.width='100%';S('s2Count').textContent='1/1';S('s2Est').textContent='<1s';S('s2Rem').textContent='已完成';}
if(stage===3){
const pct=budget>0?Math.min(done/budget*100,100):0;
S('s3Fill').style.width=pct+'%';
S('s3Count').textContent=done+'/'+budget;
const elapsed=(Date.now()-estStart)/1000;
const rate=done>0?elapsed/done:0;
const remain=rate*(budget-done);
S('s3Est').textContent='预计 '+fmtDur(elapsed+remain);
S('s3Rem').textContent='剩余 '+fmtDur(Math.max(0,remain));
S('pAvail').textContent=done;
S('pBestScore').textContent=p.bestScore>0?p.bestScore.toFixed(1)+'ms':'-';
S('pBestIP').textContent=p.bestIP||'-';
S('pElapsed').textContent=fmtDur(elapsed);
}
if(stage>=4){
S('s4Fill').style.width='100%';S('s4Count').textContent='1/1';S('s4Est').textContent='<1s';S('s4Rem').textContent='已完成';
S('statusLabel').textContent='完成';
}
}

function fmtDur(s){if(s<60)return Math.round(s)+'s';const m=Math.floor(s/60);const sec=Math.round(s%60);return m+':'+(sec<10?'0':'')+sec;}

async function pollResult(id){
try{
const r=await fetch('/api/scan/'+id);
const d=await r.json();
if(d.status==='completed'){
renderResults(d.result||[]);
resetButtons();
S('statusLabel').textContent='完成';
showToast('扫描完成');
}else if(d.status==='failed'){
showError(d.error||'扫描失败');
resetButtons();
S('statusLabel').textContent='失败';
}else{setTimeout(()=>pollResult(id),1000);}
}catch(e){showError('获取结果失败');resetButtons();}
}

function resetButtons(){
S('startBtn').disabled=false;
S('startBtn').classList.remove('hidden');
S('cancelBtn').classList.add('hidden');
}

function cancelScan(){
if(!curId)return;
fetch('/api/cancel/'+curId);
if(es)es.close();
resetButtons();
S('statusLabel').textContent='已取消';
}

// History
function loadHistory(){
try{return JSON.parse(localStorage.getItem('vect-history')||'[]');}catch{return[]}
}
function saveHistory(h){localStorage.setItem('vect-history',JSON.stringify(h))}

function renderResults(r){
results=r;
if(!r||!r.length)return;
const history=loadHistory();
const entry={
time:new Date().toLocaleString(),
cidrs:S('cidrs').value.split('\n').map(s=>s.trim()).filter(Boolean).join(', '),
asn:S('asn').value.trim(),
budget:S('budget').value,
results:r.map(x=>({
ip:x.ip,
score:x.score_ms,
colo:x.trace&&x.trace.colo?x.trace.colo:'',
prefix:x.prefix||'',
route:x.trace&&x.trace.route?x.trace.route:'',
dlOk:x.download_ok,
dlMbps:x.download_mbps,
dlError:x.download_error
}))
};
history.unshift(entry);
if(history.length>50)history.length=50;
saveHistory(history);
renderHistory();
}

function renderHistory(){
const history=loadHistory();
const list=S('historyList');
S('historyCount').textContent=history.length+' 条记录';
S('clearHistoryBtn').style.display=history.length?'':'none';
if(!history.length){list.innerHTML='<div class="history-empty">暂无扫描记录</div>';return;}
let html='';
history.forEach((h,hi)=>{
const r0=h.results[0];
html+='<div class="glass-card history-item">';
html+='<div class="history-item-top"><span class="h-time">'+h.time+'</span><button class="del-btn" onclick="deleteHistory('+hi+')" title="删除"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h12M6 6V4a1 1 0 011-1h6a1 1 0 011 1v2M8 9v6M12 9v6M3 6l1 12h12l1-12"/></svg></button></div>';
html+='<div class="ip" onclick="copyText(\''+(r0?r0.ip:'')+'\')">'+(r0?r0.ip:'')+'</div>';
html+='<div class="history-metrics">';
if(r0)html+='<span class="hm">期望带宽: <strong>'+(r0.prefix?r0.prefix:'-')+'</strong></span>';
if(r0)html+='<span class="hm">实测带宽: <strong class="'+(r0.dlOk?'ok':'fail')+'">'+(r0.dlOk?r0.dlMbps.toFixed(1)+' Mbps':'-')+'</strong></span>';
if(r0)html+='<span class="hm">往返延迟: <strong>'+r0.score.toFixed(1)+'ms</strong></span>';
if(r0)html+='<span class="hm">峰值速度: <strong>'+(r0.dlOk?r0.dlMbps.toFixed(1)+' Mbps':'-')+'</strong></span>';
if(r0)html+='<span class="hm">数据中心: <strong>'+(r0.colo||'-')+'</strong></span>';
if(tracerouteEnabled&&r0)html+='<span class="hm"><span style="color:var(--primary);cursor:pointer;font-size:12px" onclick="runTracerouteHist(\''+r0.ip+'\',\''+hi+'\')">路由追踪</span></span>';
html+='</div>';
if(tracerouteEnabled)html+='<div id="tr_hist_'+hi+'"></div>';
html+='</div>';
});
list.innerHTML=html;
}

function deleteHistory(idx){
let history=loadHistory();
history.splice(idx,1);
saveHistory(history);
renderHistory();
showToast('已删除');
}

function clearHistory(){
if(!confirm('确认清空所有扫描记录？'))return;
saveHistory([]);
renderHistory();
showToast('已清空');
}

// Traceroute
const tracerouteCache={};
async function runTracerouteHist(ip,hi){
const trEl=S('tr_hist_'+hi);
if(tracerouteCache[ip]){renderTracerouteHist(ip,tracerouteCache[ip],hi);return;}
if(trEl)trEl.innerHTML='<span style="color:var(--muted2);font-size:11px">追踪中...</span>';
try{
const r=await fetch('/api/traceroute/'+ip);
const hops=await r.json();
tracerouteCache[ip]=hops;
renderTracerouteHist(ip,hops,hi);
}catch(e){if(trEl)trEl.innerHTML='<span style="color:var(--danger);font-size:11px">失败</span>';}
}

function renderTracerouteHist(ip,hops,hi){
const trEl=S('tr_hist_'+hi);
if(!trEl)return;
if(!hops||!hops.length){trEl.innerHTML='<span style="color:var(--muted2);font-size:11px">无路由</span>';return;}
if(hops.length===1&&hops[0].ip==='N/A'){trEl.innerHTML='<span style="color:var(--muted2);font-size:11px">iOS 不支持</span>';return;}
let html='<div class="trace-wrap">';
hops.forEach(h=>{
if(h.lost)html+='<div class="trace-row"><span class="trace-hop">'+h.hop+'</span><span class="trace-lost">*</span></div>';
else html+='<div class="trace-row"><span class="trace-hop">'+h.hop+'</span><span class="trace-ip">'+h.ip+'</span><span class="trace-ms">'+(h.ms||'')+'</span></div>';
});
html+='</div>';
trEl.innerHTML=html;
}

function copyBestIP(){
const ip=S('pBestIP').textContent.trim();
if(!ip||ip==='-')return;
copyText(ip);
}
function copyText(t){
if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>showToast('已复制: '+t));}
else{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制: '+t);}
}
function showToast(m){
const t=S('toast');t.textContent=m;t.classList.add('show');
clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
function showError(m){
S('errorText').textContent=m;S('error-msg').classList.remove('hidden');
}
function hideError(){
S('error-msg').classList.add('hidden');
}

// Init
renderHistory();
updateTracerouteUI();
const style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(style);
</script>
</body>
</html>
